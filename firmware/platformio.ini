; ─── p-ink Firmware ────────────────────────────────────────────────────────
; Board: ESP32-S3-DevKitC-1-N16R8 (16MB flash, 8MB PSRAM)
; Display: Waveshare 7.5" V2 e-Paper (800x480 BW)
;
; Flash with:  pio run -t upload
; Monitor:     pio device monitor
; Erase NVS:   pio run -t erase  (resets WiFi/pairing config)
; ──────────────────────────────────────────────────────────────────────────────

[env:p-ink_s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; 8MB PSRAM (OPI) on N16R8 variant
board_build.arduino.memory_type = qio_opi

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

upload_speed = 921600

; Partition scheme: 4MB app + 8MB spiffs (for future assets)
board_build.partitions = huge_app.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCORE_DEBUG_LEVEL=3
  -DCONFIG_ARDUHAL_LOG_COLORS=1
  ; Firmware version — bump on each release
  -DFIRMWARE_VERSION='"1.0.0"'

lib_deps =
  bblanchon/ArduinoJson         @ ^7.0.0
  ZinggJM/GxEPD2                @ ^1.5.8
  adafruit/Adafruit GFX Library @ ^1.11.9
  ; HTTPUpdate is built into the ESP32 Arduino framework — no extra lib needed